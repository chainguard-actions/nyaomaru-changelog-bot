name: Version Bump

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Select version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          install: true

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate new version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          set -euo pipefail
          pnpm version "$RELEASE_TYPE" --no-git-tag-version
          version_no_v=$(node -p "require('./package.json').version")
          printf 'new_version=%s\n' "$version_no_v" >> "$GITHUB_ENV"

      - name: Create new branch
        run: git checkout -b "release/${new_version}"

      - name: Configure git (bot identity)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update remote to use token
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote -v

      - name: Commit & Push changes
        run: |
          git add package.json pnpm-lock.yaml || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump version to ${new_version}"
          else
            echo "No changes to commit"
          fi
          git push -u origin "HEAD:release/${new_version}"

      - name: Create Pull Request
        run: |
          gh pr create \
            --base main \
            --head "release/${new_version}" \
            --title "Release: ${new_version}" \
            --body "Auto-generated release PR for version ${new_version}"
