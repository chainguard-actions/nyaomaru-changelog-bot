name: Test why-related inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with why-related inputs
        id: action
        uses: .
        with:
          why: 'false'
          why-confidence: 'medium'
          why-label: 'Why'
          why-max-prs: '10'
          why-max-chars-per-pr: '2000'
          dry-run: 'true'
          no-ai: 'true'
        continue-on-error: true
      - name: Assert action ran with why-related inputs
        run: |
          echo "Action completed (why, why-confidence, why-label, why-max-prs, why-max-chars-per-pr inputs were passed)"
          echo "PASS"
