name: Test why-related inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          why: 'false'
          why-max-prs: '5'
          why-max-chars-per-pr: '1000'
          why-confidence: 'medium'
          why-label: 'Why'
      - name: Assert action completed
        run: |
          echo "PASS: action ran with why, why-max-prs, why-max-chars-per-pr, why-confidence, and why-label inputs"
