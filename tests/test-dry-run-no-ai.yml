name: Test dry-run with no-ai
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a minimal CHANGELOG.md for the test
        run: |
          echo "# Changelog" > CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: add changelog" --allow-empty

      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
          release-name: '0.0.1'
          changelog-path: 'CHANGELOG.md'
          npm-version: 'latest'
          minimum-package-age-days: '0'

      - name: Assert action completed successfully
        run: |
          echo "PASS: action completed in dry-run + no-ai mode without error"
