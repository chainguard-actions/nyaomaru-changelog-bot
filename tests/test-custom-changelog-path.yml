name: Test custom changelog path in dry-run mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create a custom CHANGELOG file
        run: |
          mkdir -p docs
          echo "# Changelog" > docs/CHANGES.md
          git add docs/CHANGES.md
          git commit -m "test: add custom changelog file" --allow-empty

      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          changelog-path: 'docs/CHANGES.md'
          release-tag: 'HEAD'
          release-name: '0.0.0-test'
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Assert action completed successfully with custom changelog path
        run: |
          echo "PASS: action completed with custom changelog-path in dry-run/no-ai mode"
