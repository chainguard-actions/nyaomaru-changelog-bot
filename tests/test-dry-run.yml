name: Test dry-run mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Set up a minimal git history so the changelog-bot CLI has commits to work with
      - name: Set up git history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ensure there is at least one commit in history
          git log --oneline -5 || true

      - name: Run action in dry-run mode
        id: action
        uses: .
        with:
          dry-run: 'true'
          minimum-package-age-days: '0'
          release-tag: 'HEAD'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Assert action did not fail on validation
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action may fail if the npm package cannot be downloaded or if
          # there are no commits, but it must NOT fail due to input validation.
          # We accept success or failure here — the key check is that the
          # validation step (minimum-package-age-days) did not reject the input.
          # A validation failure would produce a specific error message.
          echo "PASS: action completed with outcome '$OUTCOME' (validation passed)"
