name: Test config-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: dummy-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with config-path input
        id: action
        uses: .
        with:
          config-path: ${{ github.workspace }}/actions/hardened/nyaomaru--changelog-bot/v0.5.1/tests/fixtures/changelog-bot-config.json
          dry-run: "true"
          no-ai: "true"
          npm-version: "latest"
          minimum-package-age-days: "0"
      - name: Assert action completed
        run: |
          echo "PASS: action completed with config-path input"
