name: Test config-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with config-path
        id: action
        uses: .
        with:
          config-path: '${{ github.workspace }}/hardened/tests/fixtures/changelog-bot-config.json'
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action completed
        run: |
          echo "PASS: action completed with config-path input"
