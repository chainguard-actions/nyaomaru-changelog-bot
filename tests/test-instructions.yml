name: Test instructions and instructions-file inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create instructions file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tmp-instructions"
          echo "Group changes by type. Be concise." > "$GITHUB_WORKSPACE/tmp-instructions/instructions.txt"
      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          instructions: 'Keep entries short and clear.'
          instructions-file: './tmp-instructions/instructions.txt'
      - name: Assert action completed
        run: |
          echo "PASS: action ran with instructions and instructions-file inputs"
