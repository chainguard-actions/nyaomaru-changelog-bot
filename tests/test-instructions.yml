name: Test instructions and instructions-file inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with instructions and instructions-file
        id: action
        uses: .
        with:
          instructions: 'Be concise and group by feature area'
          instructions-file: '${{ github.workspace }}/hardened/tests/fixtures/instructions.txt'
          dry-run: 'true'
          no-ai: 'true'
        continue-on-error: true
      - name: Assert action ran with instructions inputs
        run: |
          echo "Action completed (instructions and instructions-file inputs were passed)"
          echo "PASS"
