name: Test instructions and instructions-file inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with instructions and instructions-file
        id: action
        uses: .
        with:
          instructions: 'Group by feature and bugfix. Be concise.'
          instructions-file: '${{ github.workspace }}/hardened/tests/fixtures/changelog-instructions.txt'
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action completed
        run: |
          echo "PASS: action completed with instructions and instructions-file inputs"
