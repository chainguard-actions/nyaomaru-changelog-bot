name: Test instructions and release-body options (dry-run, no-ai)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create instructions file
        run: |
          echo "Group bug fixes together. Use concise language." > /tmp/changelog-instructions.txt
      - name: Run changelog-bot with instructions and release-body in dry-run no-ai mode
        id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          instructions: 'Group bug fixes together.'
          instructions-file: '/tmp/changelog-instructions.txt'
          release-body: 'This release includes important bug fixes and improvements.'
          release-tag: 'HEAD'
          release-name: '0.0.0-test'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action completed successfully
        run: |
          echo "Action completed with instructions, instructions-file, and release-body options"
          echo "PASS"
