name: Test base-branch and config-path inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a minimal config file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tmp-config"
          cat > "$GITHUB_WORKSPACE/tmp-config/changelog-bot.json" <<'EOF'
          {}
          EOF
      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          base-branch: 'main'
          config-path: './tmp-config/changelog-bot.json'
          fail-on-llm-error: 'false'
      - name: Assert action completed
        run: |
          echo "PASS: action ran with base-branch, config-path, and fail-on-llm-error inputs"
