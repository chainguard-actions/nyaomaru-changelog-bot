name: Test provider and LLM error-handling flags
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: dummy-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          provider: "openai"
          fail-on-llm-error: "false"
          require-provider: "false"
          dry-run-json-report: "true"
          dry-run: "true"
          no-ai: "true"
          npm-version: "latest"
          minimum-package-age-days: "0"
        continue-on-error: true
      - name: Assert action ran with provider flags
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: step was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with provider, fail-on-llm-error, require-provider, and dry-run-json-report inputs"
