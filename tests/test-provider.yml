name: Test provider input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          provider: 'openai'
      - name: Assert action completed
        run: |
          echo "PASS: action ran with provider input set to openai (no-ai overrides actual call)"
