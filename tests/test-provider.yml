name: Test provider input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with provider input
        id: action
        uses: .
        with:
          provider: 'openai'
          dry-run: 'true'
          no-ai: 'true'
          fail-on-llm-error: 'false'
          require-provider: 'false'
          release-tag: 'HEAD'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action completed
        run: |
          echo "PASS: action completed with provider input"
