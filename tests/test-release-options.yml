name: Test release options inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: dummy-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with release-body and base-branch inputs
        id: action
        uses: .
        with:
          release-body: "Initial release with core features."
          base-branch: main
          dry-run: "true"
          no-ai: "true"
          npm-version: "latest"
          minimum-package-age-days: "0"
      - name: Assert action completed
        run: |
          echo "PASS: action completed with release-body and base-branch inputs"
