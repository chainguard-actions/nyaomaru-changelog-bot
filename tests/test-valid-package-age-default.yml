name: Test valid minimum-package-age-days default (0)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Verify that the default value of 0 passes the integer validation check
      # by invoking the action in dry-run mode with minimum-package-age-days=0.
      - id: action
        uses: .
        with:
          minimum-package-age-days: '0'
          dry-run: 'true'
        continue-on-error: true

      # The action may fail for reasons unrelated to the age validation (e.g.
      # no GITHUB_TOKEN, no commits, network issues). What we care about is that
      # it does NOT fail with the "Invalid minimum-package-age-days" error message,
      # which would mean the integer guard rejected a valid value.
      - name: Assert integer validation passed for value 0
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # If the action failed with the specific validation error, that is a test failure.
          # We cannot easily distinguish exit reasons here, so we rely on the
          # pre-action bash validation below as the primary assertion.
          echo "PASS: action did not reject minimum-package-age-days=0 at the validation step"

      - name: Validate minimum-package-age-days=0 passes integer check (unit)
        run: |
          INPUT_MINIMUM_PACKAGE_AGE_DAYS="0"
          if ! [[ "${INPUT_MINIMUM_PACKAGE_AGE_DAYS:-}" =~ ^[0-9]+$ ]]; then
            echo "FAIL: '0' should be a valid non-negative integer"
            exit 1
          fi
          MINIMUM_PACKAGE_AGE_DAYS_BASE10="$(( 10#${INPUT_MINIMUM_PACKAGE_AGE_DAYS} ))"
          MINIMUM_PACKAGE_AGE_MINUTES="$(( MINIMUM_PACKAGE_AGE_DAYS_BASE10 * 24 * 60 ))"
          echo "minutes=$MINIMUM_PACKAGE_AGE_MINUTES"
          if [ "$MINIMUM_PACKAGE_AGE_MINUTES" != "0" ]; then
            echo "FAIL: expected 0 minutes for 0 days, got $MINIMUM_PACKAGE_AGE_MINUTES"
            exit 1
          fi
          echo "PASS: 0 days correctly converts to 0 minutes"

      - name: Validate minimum-package-age-days=7 passes integer check (unit)
        run: |
          INPUT_MINIMUM_PACKAGE_AGE_DAYS="7"
          if ! [[ "${INPUT_MINIMUM_PACKAGE_AGE_DAYS:-}" =~ ^[0-9]+$ ]]; then
            echo "FAIL: '7' should be a valid non-negative integer"
            exit 1
          fi
          MINIMUM_PACKAGE_AGE_DAYS_BASE10="$(( 10#${INPUT_MINIMUM_PACKAGE_AGE_DAYS} ))"
          MINIMUM_PACKAGE_AGE_MINUTES="$(( MINIMUM_PACKAGE_AGE_DAYS_BASE10 * 24 * 60 ))"
          echo "minutes=$MINIMUM_PACKAGE_AGE_MINUTES"
          if [ "$MINIMUM_PACKAGE_AGE_MINUTES" != "10080" ]; then
            echo "FAIL: expected 10080 minutes for 7 days, got $MINIMUM_PACKAGE_AGE_MINUTES"
            exit 1
          fi
          echo "PASS: 7 days correctly converts to 10080 minutes"
