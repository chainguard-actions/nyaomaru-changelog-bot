name: Test dry-run with language input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a minimal CHANGELOG.md
        run: |
          echo "# Changelog" > CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: add changelog" --allow-empty

      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
          release-name: '2.0.0'
          language: 'en'
          minimum-package-age-days: '0'
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Assert action completed successfully with language input
        run: |
          echo "Action completed without error using language input"
          echo "PASS"
