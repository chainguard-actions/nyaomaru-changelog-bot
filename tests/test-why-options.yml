name: Test why-related inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with why-related inputs
        id: action
        uses: .
        with:
          why: 'true'
          why-max-prs: '5'
          why-max-chars-per-pr: '1000'
          why-confidence: 'medium'
          why-label: 'Why'
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action completed
        run: |
          echo "PASS: action completed with why-related inputs"
