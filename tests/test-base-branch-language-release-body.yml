name: Test base-branch, language, and release-body inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with base-branch, language, release-body
        id: action
        uses: .
        with:
          base-branch: 'main'
          language: 'English'
          release-body: 'Test release notes for coverage'
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action completed
        run: |
          echo "PASS: action completed with base-branch, language, and release-body inputs"
