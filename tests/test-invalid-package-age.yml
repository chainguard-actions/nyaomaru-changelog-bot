name: Test invalid minimum-package-age-days
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with invalid minimum-package-age-days (expect failure)
        id: action
        uses: .
        with:
          minimum-package-age-days: 'not-a-number'
          dry-run: 'true'
        continue-on-error: true

      - name: Assert action failed
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid minimum-package-age-days, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid minimum-package-age-days"
