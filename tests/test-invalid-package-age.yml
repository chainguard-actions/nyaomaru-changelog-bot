name: Test invalid minimum-package-age-days validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Pre-enable corepack
        run: |
          corepack enable || true

      - name: Run changelog-bot with invalid minimum-package-age-days (expect failure)
        id: action
        uses: .
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          dry-run: 'true'
          no-ai: 'true'
          minimum-package-age-days: 'not-a-number'
          npm-version: '0.6.5'

      - name: Assert action failed with invalid input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid minimum-package-age-days, but got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed on invalid minimum-package-age-days"
