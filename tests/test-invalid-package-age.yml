name: Test invalid minimum-package-age-days validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: dummy-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          minimum-package-age-days: 'not-a-number'
        continue-on-error: true

      - name: Assert action failed with invalid input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid minimum-package-age-days, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on invalid minimum-package-age-days"
