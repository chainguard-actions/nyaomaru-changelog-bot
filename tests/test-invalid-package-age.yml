name: Test invalid minimum-package-age-days validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with invalid minimum-package-age-days
        id: action
        uses: .
        continue-on-error: true
        with:
          dry-run: 'true'
          no-ai: 'true'
          minimum-package-age-days: 'not-a-number'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action failed due to invalid input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid minimum-package-age-days, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on invalid minimum-package-age-days"
