name: Test custom optional inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create custom changelog file
        run: |
          echo "# Changelog" > /tmp/CUSTOM_CHANGELOG.md
      - id: action
        uses: .
        env:
          GITHUB_TOKEN: dummy-token-for-dry-run
        with:
          dry-run: 'true'
          release-tag: HEAD
          release-name: '1.0.0'
          changelog-path: '/tmp/CUSTOM_CHANGELOG.md'
          language: 'en'
          npm-version: 'latest'
          minimum-package-age-days: '0'
      - name: Assert action completed with custom inputs
        run: |
          echo "PASS: action completed with custom changelog-path and language inputs"
