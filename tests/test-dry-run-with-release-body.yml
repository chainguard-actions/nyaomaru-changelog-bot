name: Test dry-run with release body and custom changelog path
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create a temporary changelog file
        run: |
          mkdir -p /tmp/changelog-test
          echo "# Changelog" > /tmp/changelog-test/CHANGELOG.md

      - name: Run changelog-bot in dry-run mode with release body
        id: action
        uses: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
          release-name: '1.0.0-test'
          release-body: 'Initial test release with some fixes and improvements.'
          changelog-path: '/tmp/changelog-test/CHANGELOG.md'

      - name: Assert action completed successfully
        run: |
          echo "PASS: action completed without error in dry-run mode with release body"
