name: Test dry-run with release body and custom changelog path
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"

      - name: Create a temporary changelog file for testing
        run: |
          echo "# Changelog" > "$GITHUB_WORKSPACE/TEST_CHANGELOG.md"

      - name: Pre-enable corepack
        run: |
          corepack enable || true

      - name: Run changelog-bot with release body in dry-run mode
        uses: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
          release-name: '1.0.0-test'
          release-body: 'This is a test release note for CI validation.'
          changelog-path: 'TEST_CHANGELOG.md'
          npm-version: '0.6.5'

      - name: Assert action completed successfully
        run: |
          echo "PASS: action completed with release-body and changelog-path inputs"
