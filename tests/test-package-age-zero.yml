name: Test minimum-package-age-days zero (default)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run changelog-bot with explicit minimum-package-age-days=0
        id: action
        uses: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
          release-name: '0.0.2-test'
          minimum-package-age-days: '0'

      - name: Assert action completed successfully
        run: |
          echo "PASS: action completed without error with minimum-package-age-days=0"
