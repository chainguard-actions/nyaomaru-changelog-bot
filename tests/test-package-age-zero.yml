name: Test minimum-package-age-days with zero value
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "test@example.com"
          git config user.name "Test User"

      - name: Pre-enable corepack
        run: |
          corepack enable || true

      - name: Run changelog-bot with minimum-package-age-days=0 (guard disabled)
        uses: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          dry-run: 'true'
          no-ai: 'true'
          release-tag: 'HEAD'
          release-name: '0.0.1-test'
          minimum-package-age-days: '0'
          npm-version: '0.6.5'

      - name: Assert action completed successfully
        run: |
          echo "PASS: action completed with minimum-package-age-days=0"
