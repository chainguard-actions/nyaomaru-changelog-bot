name: Test dry-run-json-report input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: dummy-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run changelog-bot with dry-run-json-report input
        id: action
        uses: .
        with:
          dry-run: "true"
          dry-run-json-report: "true"
          no-ai: "true"
          npm-version: "latest"
          minimum-package-age-days: "0"
      - name: Assert action completed
        run: |
          echo "PASS: action completed with dry-run-json-report input"
