name: Test dry-run-json-report and require-provider inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dry-run: 'true'
          no-ai: 'true'
          dry-run-json-report: 'true'
          require-provider: 'false'
      - name: Assert action completed
        run: |
          echo "PASS: action ran with dry-run-json-report and require-provider inputs"
