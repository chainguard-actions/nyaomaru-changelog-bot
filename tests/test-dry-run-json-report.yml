name: Test dry-run-json-report and fail-on-llm-error inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with dry-run-json-report and fail-on-llm-error
        id: action
        uses: .
        with:
          dry-run: 'true'
          dry-run-json-report: 'true'
          fail-on-llm-error: 'false'
          no-ai: 'true'
        continue-on-error: true
      - name: Assert action ran with dry-run-json-report and fail-on-llm-error inputs
        run: |
          echo "Action completed (dry-run-json-report and fail-on-llm-error inputs were passed)"
          echo "PASS"
